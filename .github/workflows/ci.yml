name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      S52_VERSION: "0.3.0"
      S52_RELEASE_MAVEN_ZIP: "https://github.com/bareboat-necessities/s52-kotlin-webgl/releases/download/v0.3.0/s52-kotlin-webgl-release-maven-0.3.0.zip"
      S52_RELEASE_MAVEN_SHA256: "ed4ece6664670fec275f1d3d8d2ff52f1dfa54384501ebd97553c670e9687a79"
      S52_RELEASE_SOURCE_ZIP: "https://github.com/bareboat-necessities/s52-kotlin-webgl/releases/download/v0.3.0/s52-kotlin-webgl-0.3.0-phase22-source.zip"
      S52_RELEASE_SOURCE_SHA256: "d75189103d710c9c5065a6fc392a8d38b0e1d05ddc7c4eba3a0027f6e866f900"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'
      - name: Download s52-kotlin-webgl Maven release
        shell: bash
        run: |
          mkdir -p build/s52-maven
          curl -fL "$S52_RELEASE_MAVEN_ZIP" -o /tmp/s52-kotlin-webgl-release-maven.zip
          echo "$S52_RELEASE_MAVEN_SHA256  /tmp/s52-kotlin-webgl-release-maven.zip" | sha256sum -c -
          unzip -q /tmp/s52-kotlin-webgl-release-maven.zip -d build/s52-maven
          find build/s52-maven -maxdepth 4 -type f | sort | head -40
      - name: Download s52-kotlin-webgl source release for JS composite build
        shell: bash
        run: |
          mkdir -p build/s52-source-unpacked
          curl -fL "$S52_RELEASE_SOURCE_ZIP" -o /tmp/s52-kotlin-webgl-source.zip
          echo "$S52_RELEASE_SOURCE_SHA256  /tmp/s52-kotlin-webgl-source.zip" | sha256sum -c -
          unzip -q /tmp/s52-kotlin-webgl-source.zip -d build/s52-source-unpacked
          S52_SOURCE_DIR=$(find build/s52-source-unpacked -name settings.gradle.kts -printf '%h\n' | head -1)
          if [ -z "$S52_SOURCE_DIR" ]; then
            echo "Could not locate s52 source settings.gradle.kts in source release" >&2
            exit 1
          fi
          echo "S52_SOURCE_DIR=${{ github.workspace }}/$S52_SOURCE_DIR" >> "$GITHUB_ENV"
          echo "Using S52 source composite build at $S52_SOURCE_DIR"
      - name: Build Phase 15
        run: gradle :demo:phase12_13_14BCheck phase11Check :s57-render-webgl:jvmTest -Ps52.version=$S52_VERSION -Ps52MavenRepo=${{ github.workspace }}/build/s52-maven -Ps52SourceDir="$S52_SOURCE_DIR" --stacktrace
