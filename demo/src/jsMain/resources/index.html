<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>s57-kotlin-webgl demo</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: #f6f8fb; color: #16202a; }
    .shell { display: grid; grid-template-columns: 340px 1fr; gap: 20px; align-items: start; }
    .panel { background: white; border: 1px solid #d8dee8; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    canvas { width: 100%; max-width: 960px; height: 540px; background: #101923; border-radius: 12px; border: 1px solid #334; }
    pre { white-space: pre-wrap; font-size: 13px; }
    .warning { color: #9a3412; font-weight: 600; }
  .events{white-space:pre-wrap;font-family:monospace;background:#f6f8fa;padding:12px;border:1px solid #ddd}</style>
</head>
<body>
  <h1>s57-kotlin-webgl</h1>
  <p class="warning">Experimental. Not for navigation.</p>
  <div class="shell">
    <section class="panel">
      <h2>Load local ENC files</h2>
      <input id="fileInput" type="file" multiple />
      <button id="renderButton">Initialize WebGL canvas</button>
      <h3>Selected files</h3>
      <pre id="fileList">No files selected.</pre>
      <h3>Status</h3>
      <pre id="status">Phase 0 demo shell ready.</pre>
    </section>
    <section class="panel">
      <canvas id="chartCanvas" width="1280" height="720"></canvas>
    </section>
  </div>
  <script src="demo.js"></script>
</body>
</html>
